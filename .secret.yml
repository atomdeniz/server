# ==============================================================================
# Secret Variables (copy to secret.yml and encrypt with ansible-vault)
# ==============================================================================

# --- Email ---
email_password: # email password

# --- Cloudflare ---
cloudflare_email: # cloudflare email
cloudflare_api_key: # cloudflare api key

# --- Traefik ---
traefik_basic_auth_hash: # htpasswd -nb user traefik_password
traefik_password: # traefik dashboard password (used by homepage widget)

# --- CrowdSec ---
# Keys are auto-managed by the crowdsec role (stored on server)

# --- Authelia ---
authelia_password: # authelia user password (will be sha512 hashed)
authelia_jwt_secret: # openssl rand -hex 64
authelia_session_secret: # openssl rand -hex 64
authelia_storage_encryption_key: # openssl rand -hex 64

# --- AdGuard Home ---
adguard_password_hash: # htpasswd -B -C 10 -n -b admin <password> | cut -d':' -f2
adguard_password: # adguard password (used by homepage widget)

# --- Amnezia WG ---
amnezia_password_hash: # htpasswd -nb user <password> | cut -d':' -f2
amnezia_password: # amnezia password (used by homepage widget)

# --- Grafana ---
grafana_password: # grafana admin password (used by homepage widget)

# --- PocketBase ---
pocketbase_admin_password: # pocketbase superuser password

# --- Proxy (Xray VLESS+Vision+Reality + Hysteria2) ---
# Reality keypair: docker run --rm ghcr.io/xtls/xray-core:latest x25519
reality_private_key: # Reality x25519 private key (server)
reality_short_id: # openssl rand -hex 8
vless_reality_uuid: # uuidgen
hysteria_password: # openssl rand -base64 32
hysteria_obfs_password: # openssl rand -base64 32

# --- Telegram ---
telegram_user_id: # telegram user id
telegram_alert_bot_token: # bot for alerts (gatus, backup, changedetection)
telegram_traefik_bot_token: # bot for traefikshaper IP-allowlist notifications
# --- Freqtrade ---
freqtrade_jwt_secret_key: # openssl rand -hex 64
freqtrade_api_password: # freqtrade api password
freqtrade_api_username: # freqtrade api username
freqtrade_ws_token: # openssl rand -hex 64

# --- Exchange API Keys (Freqtrade) ---
binance_exchange_api_key: # binance api key
binance_exchange_api_secret: # binance api secret
kucoin_exchange_api_key: # kucoin api key
kucoin_exchange_api_secret: # kucoin api secret
kucoin_exchange_api_password: # kucoin api password

# --- Hetzner Storage Box ---
storagebox_smb_pass: # hetzner storagebox password

# --- Restic Backup ---
restic_password: # openssl rand -hex 32

# --- Immich ---
immich_db_password: # openssl rand -hex 32

# --- Spliit ---
spliit_postgres_password: # openssl rand -hex 32

# --- Umami ---
umami_postgres_password: # openssl rand -hex 32

# --- n8n API ---
n8n_api_key: # Settings > n8n API'den üretilen key (workflow yönetimi için)

# --- Ekstre ---
ekstre_imap_user: # IMAP mailbox address
ekstre_imap_password: # Gmail app password

# --- Changedetection ---
changedetection_browser_token: # openssl rand -hex 32
changedetection_api_key: # from ChangeDetection Settings > API

# --- Homepage External Widgets ---
immich_api_key: # from Immich > Account Settings > API Keys
