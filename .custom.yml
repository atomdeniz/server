# ==============================================================================
# Custom Variables (copy to custom.yml — not encrypted, but gitignored)
# ==============================================================================

# --- Server Connection ---
username: "ansible"
ansible_host: "192.168.1.1"
root_host: "example.com"
ansible_ssh_private_key_file: "~/.ssh/ansible"

# --- Email ---
email_recipient: "reciever@gmail.com" #email to receive notifications
email_smtp_host: "smtp.gmail.com"
email_smtp_port: "587"
email_login: "sender@gmail.com" #email to send notifications

# --- Deploy ---
force_recreate: true

# --- Immich Storage ---
immich_storage_box_host: "" #uXXXXXX.your-storagebox.de
immich_storage_box_user: "" #uXXXXXX

# --- Seafile Storage ---
seafile_storage_box_host: "" #same as immich if shared
seafile_storage_box_user: "" #same as immich if shared
seafile_admin_email: "" #seafile admin email
