# ==============================================================================
# Custom Variables (copy to custom.yml — not encrypted, but gitignored)
# ==============================================================================

# --- Server Connection ---
username: "ansible"
ansible_host: "192.168.1.1"
root_host: "example.com"
ansible_ssh_private_key_file: "~/.ssh/ansible"

# --- Email ---
email_recipient: "reciever@gmail.com" # email to receive notifications
email_smtp_host: "smtp.gmail.com"
email_smtp_port: "587"
email_login: "sender@gmail.com" # email to send notifications

# --- Deploy ---
force_recreate: true

# --- Hetzner Storage Box ---
storagebox_host: "" # uXXXXXX.your-storagebox.de
storagebox_user: "" # uXXXXXX

# --- Seedbox (Ultra.cc) ---
seedbox_host: "" # e.g. slotXXX.usbx.me
seedbox_user: "" # ultra.cc username

# --- PR Queue ---
# Reviewer rotation members. Real names — treat as personal data, do not
# commit to a public repo.
pr_queue_members:
  - "Reviewer 1"
  - "Reviewer 2"

# --- Ntfy ---
# Random prefix so ntfy.sh upstream relay (iOS APNS) doesn't collide with
# reserved topics owned by other ntfy.sh users. Generate with:
#   echo "$(whoami | head -c2)-$(openssl rand -hex 4)-"
ntfy_topic_prefix: "" # e.g. "xx-1a2b3c4d-"

# --- Homepage weather widget ---
weather_label: "City"
weather_latitude: 0.0
weather_longitude: 0.0
weather_timezone: "UTC"

# --- mywebsite ---
mywebsite_image: "" # docker image ref (e.g. your-dockerhub-user/your-image)

# --- traefikshaper (legacy, only if enabled) ---
traefikshaper_image: ""

