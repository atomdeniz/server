---
- name: Create Immich directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/immich"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"

- name: Create Immich data directories
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  loop:
    - "{{ immich_upload_location }}"
    - "{{ immich_storage_box_mount_path }}"

- name: Install cifs-utils (for Storage Box mount)
  ansible.builtin.package:
    name:
      - cifs-utils
    state: present
  when: immich_storage_box_mount_enabled | default(false)

- name: Create storagebox mount point
  ansible.builtin.file:
    path: "{{ storagebox_mount_path }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  when: immich_storage_box_mount_enabled | default(false)

- name: Write CIFS credentials file
  ansible.builtin.copy:
    content: |
      username={{ immich_storage_box_user }}
      password={{ immich_storage_box_smb_pass }}
    dest: "/etc/storagebox-credentials"
    owner: root
    group: root
    mode: "0600"
  when: immich_storage_box_mount_enabled | default(false)

- name: Check current storagebox mount uid
  ansible.builtin.shell: >
    mount | grep '{{ storagebox_mount_path }}' | grep -q 'uid={{ username }}'
  register: storagebox_uid_ok
  failed_when: false
  changed_when: false
  when: immich_storage_box_mount_enabled | default(false)

- name: Unmount immich bind mount if uid is wrong
  ansible.builtin.shell: umount -l {{ immich_storage_box_mount_path }}
  when:
    - immich_storage_box_mount_enabled | default(false)
    - storagebox_uid_ok.rc != 0
  failed_when: false

- name: Unmount storagebox CIFS if uid is wrong
  ansible.builtin.shell: umount -l {{ storagebox_mount_path }}
  when:
    - immich_storage_box_mount_enabled | default(false)
    - storagebox_uid_ok.rc != 0
  failed_when: false

- name: Check if storagebox is mounted
  ansible.builtin.shell: mount | grep -q '{{ storagebox_mount_path }}'
  register: storagebox_mounted
  failed_when: false
  changed_when: false
  when: immich_storage_box_mount_enabled | default(false)

- name: Mount Storage Box root via CIFS
  ansible.builtin.shell: >
    mount.cifs //{{ immich_storage_box_host }}/backup {{ storagebox_mount_path }}
    -o credentials=/etc/storagebox-credentials,uid={{ username }},gid={{ username }},file_mode=0775,dir_mode=0775,iocharset=utf8
  when:
    - immich_storage_box_mount_enabled | default(false)
    - storagebox_mounted.rc != 0

- name: Remove all storagebox CIFS lines from fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^//.*storagebox.*cifs"
    state: absent
  when: immich_storage_box_mount_enabled | default(false)

- name: Add storagebox to fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "//{{ immich_storage_box_host }}/backup {{ storagebox_mount_path }} cifs credentials=/etc/storagebox-credentials,uid={{ username }},gid={{ username }},file_mode=0775,dir_mode=0775,iocharset=utf8,_netdev,nofail 0 0"
    state: present
  when: immich_storage_box_mount_enabled | default(false)

- name: Ensure immich directory exists on Storage Box
  ansible.builtin.file:
    path: "{{ storagebox_mount_path }}/immich"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  when: immich_storage_box_mount_enabled | default(false)

- name: Bind mount immich data
  ansible.posix.mount:
    src: "{{ storagebox_mount_path }}/immich"
    path: "{{ immich_storage_box_mount_path }}"
    opts: bind,_netdev,nofail
    fstype: none
    state: mounted
  when: immich_storage_box_mount_enabled | default(false)

- name: Mark immich external mount as shared
  become: true
  ansible.builtin.command: mount --make-shared {{ immich_storage_box_mount_path }}
  changed_when: false
  when: immich_storage_box_mount_enabled | default(false)

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml
    dest: "{{ docker_dir }}/immich/docker-compose.yml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Copy .env
  ansible.builtin.template:
    src: .env
    dest: "{{ docker_dir }}/immich/.env"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Docker Compose up
  community.docker.docker_compose_v2:
    project_src: "{{ docker_dir }}/immich"
    state: present
    recreate: "{{ 'always' if (force_recreate | default(false)) else 'never' }}"
