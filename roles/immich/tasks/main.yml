---
- name: Create Immich directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/immich"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"

- name: Create Immich data directories
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  loop:
    - "{{ immich_upload_location }}"
    - "{{ immich_storage_box_mount_path }}"

- name: Install cifs-utils (for Storage Box mount)
  ansible.builtin.package:
    name:
      - cifs-utils
    state: present
  when: immich_storage_box_mount_enabled | default(false)

- name: Create storagebox mount point
  ansible.builtin.file:
    path: "{{ storagebox_mount_path }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  when: immich_storage_box_mount_enabled | default(false)

- name: Write CIFS credentials file
  ansible.builtin.copy:
    content: |
      username={{ immich_storage_box_user }}
      password={{ immich_storage_box_smb_pass }}
    dest: "/etc/storagebox-credentials"
    owner: root
    group: root
    mode: "0600"
  when: immich_storage_box_mount_enabled | default(false)

- name: Check if storagebox is already mounted
  ansible.builtin.shell: mount | grep -q '{{ storagebox_mount_path }}'
  register: storagebox_mounted
  failed_when: false
  changed_when: false
  when: immich_storage_box_mount_enabled | default(false)

- name: Mount Storage Box root via CIFS
  ansible.builtin.shell: >
    mount.cifs //{{ immich_storage_box_host }}/backup {{ storagebox_mount_path }}
    -o credentials=/etc/storagebox-credentials,uid={{ username }},gid={{ username }},file_mode=0775,dir_mode=0775,iocharset=utf8
  when:
    - immich_storage_box_mount_enabled | default(false)
    - storagebox_mounted.rc != 0

- name: Add storagebox to fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "//{{ immich_storage_box_host }}/backup {{ storagebox_mount_path }} cifs credentials=/etc/storagebox-credentials,uid={{ username }},gid={{ username }},file_mode=0775,dir_mode=0775,iocharset=utf8,_netdev,nofail 0 0"
    regexp: ".*{{ storagebox_mount_path }}.*"
    state: present
  when: immich_storage_box_mount_enabled | default(false)

- name: Ensure immich directory exists on Storage Box
  ansible.builtin.file:
    path: "{{ storagebox_mount_path }}/immich"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  when: immich_storage_box_mount_enabled | default(false)

- name: Bind mount immich data
  ansible.posix.mount:
    src: "{{ storagebox_mount_path }}/immich"
    path: "{{ immich_storage_box_mount_path }}"
    opts: bind
    fstype: none
    state: mounted
  when: immich_storage_box_mount_enabled | default(false)

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml
    dest: "{{ docker_dir }}/immich/docker-compose.yml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Copy .env
  ansible.builtin.template:
    src: .env
    dest: "{{ docker_dir }}/immich/.env"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Docker Compose up
  community.docker.docker_compose_v2:
    project_src: "{{ docker_dir }}/immich"
    state: present
