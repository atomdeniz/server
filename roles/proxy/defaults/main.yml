---
# Xray (VLESS + XTLS-Vision + Reality)
xray_version: "26.4.17"
xray_reality_port: 8443

# Reality masks traffic as a handshake with a real public site.
# Picking a widely-used, TLS 1.3 + HTTP/2 capable, never-censored host.
reality_dest: "www.microsoft.com:443"
reality_server_names:
  - "www.microsoft.com"

# Hysteria2 (UDP / QUIC)
hysteria_version: "2.8.1"
hysteria2_port: 443

# Decoy site Hysteria2 serves to probers on 443/udp.
hysteria_masquerade_url: "https://www.bing.com"
