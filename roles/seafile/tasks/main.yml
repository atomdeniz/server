---
- name: Create Seafile directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  loop:
    - "{{ docker_dir }}/seafile"
    - "{{ docker_dir }}/seafile/shared"
    - "{{ docker_dir }}/seafile/db"

- name: Check if Seafile initial setup is done
  ansible.builtin.stat:
    path: "{{ docker_dir }}/seafile/shared/seafile/conf/seafile.conf"
  register: seafile_setup_check

- name: Initial setup (without storage box mount)
  when: not seafile_setup_check.stat.exists
  block:
    - name: Copy docker-compose.yml (without storage box)
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ docker_dir }}/seafile/docker-compose.yml"
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0640"
      vars:
        seafile_storage_box_mount_enabled: false

    - name: Docker Compose up for initial setup
      community.docker.docker_compose_v2:
        project_src: "{{ docker_dir }}/seafile"
        state: present

    - name: Wait for initial setup to complete
      ansible.builtin.wait_for:
        path: "{{ docker_dir }}/seafile/shared/seafile/conf/seafile.conf"
        timeout: 120

    - name: Stop Seafile after initial setup
      community.docker.docker_compose_v2:
        project_src: "{{ docker_dir }}/seafile"
        state: absent

- name: Fix seahub_settings.py memcached host
  ansible.builtin.replace:
    path: "{{ docker_dir }}/seafile/shared/seafile/conf/seahub_settings.py"
    regexp: "'LOCATION': 'memcached:11211'"
    replace: "'LOCATION': 'seafile-memcached:11211'"

- name: Fix seahub_settings.py SERVICE_URL to HTTPS
  ansible.builtin.lineinfile:
    path: "{{ docker_dir }}/seafile/shared/seafile/conf/seahub_settings.py"
    regexp: '^SERVICE_URL\s*='
    line: 'SERVICE_URL = "https://{{ seafile_host }}"'

- name: Fix seahub_settings.py FILE_SERVER_ROOT to HTTPS
  ansible.builtin.lineinfile:
    path: "{{ docker_dir }}/seafile/shared/seafile/conf/seahub_settings.py"
    regexp: '^FILE_SERVER_ROOT\s*='
    line: "FILE_SERVER_ROOT = 'https://{{ seafile_host }}/seafhttp'"

- name: Install cifs-utils (for Storage Box mount)
  ansible.builtin.package:
    name:
      - cifs-utils
    state: present
  when: seafile_storage_box_mount_enabled | default(false)

- name: Create mount point
  ansible.builtin.file:
    path: "{{ seafile_storage_box_mount_path }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  when: seafile_storage_box_mount_enabled | default(false)

- name: Ensure seafile directory exists on Storage Box
  ansible.builtin.file:
    path: "{{ storagebox_mount_path }}/seafile"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  when: seafile_storage_box_mount_enabled | default(false)

- name: Bind mount seafile data
  ansible.posix.mount:
    src: "{{ storagebox_mount_path }}/seafile"
    path: "{{ seafile_storage_box_mount_path }}"
    opts: bind
    fstype: none
    state: mounted
  when: seafile_storage_box_mount_enabled | default(false)

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_dir }}/seafile/docker-compose.yml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Docker Compose up
  community.docker.docker_compose_v2:
    project_src: "{{ docker_dir }}/seafile"
    state: present
