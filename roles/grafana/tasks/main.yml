---
- name: Create prometheus directory
  ansible.builtin.file:
    path: "/etc/prometheus/"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"

- name: Copy the prometheus.yml
  ansible.builtin.template:
    src: prometheus.yml
    dest: "/etc/prometheus/prometheus.yml"
    owner: root
    group: root
    mode: "0644"

- name: Create volumes for monitoring containers
  community.docker.docker_volume:
    name: "{{ item }}"
    state: present
    driver: local
  loop:
    - prometheus-data
    - grafana-data

- name: Ensure grafana-data directory exists and has correct permissions
  ansible.builtin.file:
    path: "{{ docker_dir }}/grafana-data"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"

- name: Create grafana provisioning directories
  ansible.builtin.file:
    path: "/etc/grafana-provisioning/{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop:
    - datasources
    - alerting
    - dashboards

- name: Copy grafana datasource provisioning
  ansible.builtin.template:
    src: provisioning/datasources/datasource.yml
    dest: /etc/grafana-provisioning/datasources/datasource.yml
    owner: root
    group: root
    mode: "0644"

- name: Copy grafana alerting provisioning
  ansible.builtin.template:
    src: provisioning/alerting/alerting.yml.j2
    dest: /etc/grafana-provisioning/alerting/alerting.yml
    owner: root
    group: root
    mode: "0644"

- name: Copy grafana dashboard provisioning config
  ansible.builtin.template:
    src: provisioning/dashboards/dashboards.yml
    dest: /etc/grafana-provisioning/dashboards/dashboards.yml
    owner: root
    group: root
    mode: "0644"

- name: Create grafana dashboards directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/grafana-data/dashboards"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"

- name: Copy grafana dashboard JSON files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ docker_dir }}/grafana-data/dashboards/"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"
  with_fileglob:
    - dashboards/*.json

- name: Create prometheus container
  community.docker.docker_container:
    name: prometheus
    image: prom/prometheus:{{ prometheus_version }}
    pull: "always"
    recreate: "{{ force_recreate | default(false) }}"
    state: started
    restart_policy: unless-stopped
    cap_drop:
      - ALL
    volumes:
      - /etc/prometheus/:/etc/prometheus/
      - prometheus-data:/prometheus
    security_opts:
      - no-new-privileges:true
      - apparmor:docker-default
    command: "--config.file=/etc/prometheus/prometheus.yml"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - name: ops_network

- name: Create node exporter container
  community.docker.docker_container:
    name: node_exporter
    image: quay.io/prometheus/node-exporter:{{ node_exporter_version }}
    pull: "always"
    recreate: "{{ force_recreate | default(false) }}"
    state: started
    restart_policy: unless-stopped
    user: "1000:1000"
    pid_mode: host
    command: "--path.rootfs=/host"
    cap_drop:
      - ALL
    security_opts:
      - no-new-privileges:true
      - apparmor:docker-default
    volumes:
      - /:/host:ro,rslave
    networks:
      - name: ops_network

- name: Create cadvisor container
  community.docker.docker_container:
    name: cadvisor
    image: gcr.io/cadvisor/cadvisor:{{ cadvisor_version }}
    pull: "always"
    recreate: "{{ force_recreate | default(false) }}"
    state: started
    restart_policy: unless-stopped
    security_opts:
      - no-new-privileges:true
      - apparmor:docker-default
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - name: ops_network

- name: Create grafana container
  community.docker.docker_container:
    name: grafana
    image: grafana/grafana-oss:{{ grafana_version }}
    pull: "always"
    recreate: "{{ force_recreate | default(false) }}"
    state: started
    restart_policy: unless-stopped
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opts:
      - no-new-privileges:true
      - apparmor:docker-default
    env:
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "{{ email_smtp_host }}:{{ email_smtp_port }}"
      GF_SMTP_USER: "{{ email_login }}"
      GF_SMTP_PASSWORD: "{{ email_password }}"
      GF_SMTP_FROM_ADDRESS: "{{ email_login }}"
      GF_SMTP_FROM_NAME: "Grafana Alerts"
    volumes:
      - "{{ docker_dir }}/grafana-data:/var/lib/grafana"
      - /etc/grafana-provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - name: app_network
      - name: ops_network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "app_network"
      traefik.http.routers.grafana.entrypoints: "https"
      traefik.http.routers.grafana.rule: "Host(`{{ grafana_host }}`)"
      traefik.http.routers.grafana.tls: "true"
      traefik.http.routers.grafana.service: "grafana"
      traefik.http.routers.grafana.middlewares: "secure-vpn-with-auth@file"
      traefik.http.services.grafana.loadbalancer.server.port: "3000"
