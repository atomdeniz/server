---
- name: Create PR Queue directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/pr_queue"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"

- name: Create PR Queue data directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/pr_queue/data"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"

- name: Copy app.py
  ansible.builtin.template:
    src: app.py
    dest: "{{ docker_dir }}/pr_queue/app.py"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"

- name: Copy requirements.txt
  ansible.builtin.template:
    src: requirements.txt
    dest: "{{ docker_dir }}/pr_queue/requirements.txt"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"

- name: Copy Dockerfile
  ansible.builtin.template:
    src: Dockerfile
    dest: "{{ docker_dir }}/pr_queue/Dockerfile"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_dir }}/pr_queue/docker-compose.yml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Docker Compose up
  community.docker.docker_compose_v2:
    project_src: "{{ docker_dir }}/pr_queue"
    build: always
    state: present
    recreate: "{{ 'always' if (force_recreate | default(false)) else 'auto' }}"
