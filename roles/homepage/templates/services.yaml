---
# For configuration options and examples, please see:
# https://gethomepage.dev/latest/configs/services
# icons found here https://github.com/walkxcode/dashboard-icons

- Monitoring:
    - Grafana:
        server: my-docker
        icon: grafana.svg
        href: "https://{{ grafana_host }}"
        description: Metrics & dashboards
        widget:
          type: grafana
          url: "http://grafana:3000"
          username: admin
          password: "{% raw %}{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}{% endraw %}"
    - Gatus:
        server: my-docker
        icon: gatus.svg
        href: "https://{{ gatus_host }}"
        description: Service health
        widget:
          type: gatus
          url: http://gatus:8080
    - Prometheus:
        server: my-docker
        icon: prometheus.svg
        description: Time-series database
        widget:
          type: prometheus
          url: http://prometheus:9090
    - Diun:
        server: my-docker
        icon: diun.png
        description: Image update tracker
    - Dozzle:
        server: my-docker
        icon: dozzle.png
        href: "https://{{ dozzle_host }}"
        description: Container logs

- Network & Security:
    - Traefik:
        server: my-docker
        icon: traefik.svg
        href: "https://{{ traefik_host }}"
        description: Reverse proxy
        widget:
          type: traefik
          url: http://traefik:8080
          username: user
          password: "{% raw %}{{HOMEPAGE_VAR_TRAEFIK_PASSWORD}}{% endraw %}"
    - Crowdsec:
        server: my-docker
        icon: crowdsec.svg
        href: https://app.crowdsec.net/alerts
        description: Intrusion prevention
        widget:
          type: crowdsec
          url: http://crowdsec:8080
          username: testMachine
          password: "{% raw %}{{HOMEPAGE_VAR_CROWDSEC_MACHINE_API_KEY}}{% endraw %}"
    - Adguard:
        server: my-docker
        icon: adguard-home.svg
        href: "https://{{ adguard_host }}"
        description: DNS ad blocker
        widget:
          type: adguard
          url: http://adguardhome:3000
          username: admin
          password: "{% raw %}{{HOMEPAGE_VAR_ADGUARD_PASSWORD}}{% endraw %}"
    - AmneziaWG:
        server: my-docker
        icon: wireguard.svg
        href: "https://{{ vpn_host }}"
        description: VPN gateway
        widget:
          type: wgeasy
          url: http://amnezia-wg:51821
          password: "{% raw %}{{HOMEPAGE_VAR_AMNEZIA_PASSWORD}}{% endraw %}"

- Apps:
    - Immich:
        server: my-docker
        icon: immich.svg
        href: "https://{{ immich_host }}"
        description: Photo management
        widget:
          type: immich
          url: http://immich_server:2283
          key: "{% raw %}{{HOMEPAGE_VAR_IMMICH_API_KEY}}{% endraw %}"
          version: 2
    - Seafile:
        server: my-docker
        icon: seafile.svg
        href: "https://{{ seafile_host }}"
        description: File sync & share
    - Vaultwarden:
        server: my-docker
        icon: vaultwarden.svg
        href: "https://{{ vaultwarden_host }}"
        description: Password manager
    - N8N:
        server: my-docker
        icon: n8n.svg
        href: "https://{{ n8n_host }}"
        description: Workflow automation
    - ChangeDetection:
        server: my-docker
        icon: changedetection.png
        href: "https://{{ changedetection_host }}"
        description: Website change monitoring
        widget:
          type: changedetectionio
          url: http://changedetection:5000
          key: "{% raw %}{{HOMEPAGE_VAR_CHANGEDETECTION_API_KEY}}{% endraw %}"
    - Wallos:
        server: my-docker
        icon: wallos.png
        href: "https://{{ wallos_host }}"
        description: Subscription tracker
    - Supabase:
        server: my-docker
        icon: supabase.svg
        href: "https://{{ supabase_host }}"
        description: Backend-as-a-Service

    - Umami:
        server: my-docker
        icon: umami.svg
        href: "https://{{ umami_host }}"
        description: Web analytics
    - OpenClaw:
        server: my-docker
        icon: mdi-robot-outline
        href: "https://{{ openclaw_host }}"
        description: AI gateway

- Tools:
    - IT Tools:
        server: my-docker
        icon: it-tools.svg
        href: "https://{{ it_tools_host }}"
        description: Developer utilities
    - ConvertX:
        server: my-docker
        icon: convertx.png
        href: "https://{{ convertx_host }}"
        description: File converter
    - Pingvin Share:
        server: my-docker
        icon: pingvin-share.svg
        href: "https://{{ pingvin_host }}"
        description: File sharing
    - Web Check:
        server: my-docker
        icon: web-check.svg
        href: "https://{{ web_check_host }}"
        description: Website analysis
    - WAN IP:
        widget:
          type: customapi
          url: https://api.ipify.org?format=json
          refreshInterval: 30000
          method: GET
          mappings:
            - field: "ip"
              label: Public IP
              format: text
