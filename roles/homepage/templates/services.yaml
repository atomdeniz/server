---
# For configuration options and examples, please see:
# https://gethomepage.dev/latest/configs/services
# icons found here https://github.com/walkxcode/dashboard-icons

- Resources:
    - Grafana:
        server: my-docker
        icon: grafana.svg
        href: "https://{{ grafana_host }}"
        widget:
          type: grafana
          url: "http://grafana:3000"
          username: admin
          password: "{{ grafana_password }}"
    - UptimeKuma:
        server: my-docker
        icon: uptime-kuma.png
        href: "https://{{ uptime_kuma_host }}"
        widget:
          type: uptimekuma
          url: http://uptime_kuma:3001
          slug: server
    - Prometheus:
        server: my-docker
        icon: prometheus.svg
        widget:
          type: prometheus
          url: http://prometheus:9090
    - Immich:
        server: my-docker
        icon: immich.svg
        href: "https://{{ immich_host }}"
        widget:
          type: immich
          url: http://immich_server:2283
          key: "{{ immich_api_key | default('') }}"
          version: 2
- Network:
    - Traefik:
        server: my-docker
        icon: traefik.svg
        href: "https://{{ traefik_host }}"
        widget:
          type: traefik
          url: http://traefik:8080
          username: user
          password: "{{ traefik_password }}"
    - Crowdsec:
        server: my-docker
        icon: crowdsec.svg
        href: https://app.crowdsec.net/alerts
        widget:
          type: crowdsec
          url: http://crowdsec:8080
          username: testMachine
          password: "{{ crowdsecMachineApiKey }}"
    - Adguard:
        server: my-docker
        icon: adguard-home.svg
        href: "https://{{ adguard_host }}"
        widget:
          type: adguard
          url: http://adguardhome:3000
          username: admin
          password: "{{ adguard_password }}"
    - AmneziaWG:
        server: my-docker
        icon: wireguard.svg
        href: "https://{{ vpn_host }}"
        widget:
          type: wgeasy
          url: http://amnezia-wg:51821
          password: "{{ amnezia_password }}"
    - Caddy:
        server: my-docker
        icon: caddy.svg
        widget:
          type: caddy
          url: http://caddy:2019
- Other:
    - WhatsUpDocker:
        server: my-docker
        icon: docker.svg
        href: "https://{{ whatsupdocker_host }}"
        widget:
          type: whatsupdocker
          url: http://whatsupdocker:3000
    - GitHub:
        icon: github.svg
        href: https://github.com
    - WAN IP:
        widget:
          type: customapi
          url: https://api.ipify.org?format=json
          refreshInterval: 10000
          method: GET
          mappings:
            - field: "ip"
              format: text
