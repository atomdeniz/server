- name: Install AppArmor
  become: true
  apt:
    name: apparmor
    state: present
    update_cache: yes

- name: Start AppArmor service
  service:
    name: apparmor
    state: started
    enabled: yes

- name: Install jq
  become: true
  apt:
    name: jq
    state: present
    update_cache: yes

- name: Template the pam-notification.sh
  become: true
  ansible.builtin.template:
    src: pam-notification.sh
    dest: /opt/pam-notification.sh
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: 755

- name: Template the sshd
  become: true
  ansible.builtin.template:
    src: sshd
    dest: /etc/pam.d/sshd
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: 755
