---
- name: Create the edge_network
  community.general.docker_network:
    name: edge_network
    driver: bridge
    ipam_config:
      - subnet: 10.8.1.0/24
        gateway: 10.8.1.1
        iprange: 10.8.1.128/25

- name: Create the redis_data_network
  community.general.docker_network:
    name: redis_data_network
    driver: bridge
    internal: true
    ipam_config:
      - subnet: 10.8.2.0/24
        gateway: 10.8.2.1
        iprange: 10.8.2.128/25

