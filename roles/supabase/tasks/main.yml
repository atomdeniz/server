---
- name: Clone official supabase repo (shallow)
  ansible.builtin.git:
    repo: "https://github.com/supabase/supabase.git"
    dest: "{{ supabase_data_dir }}/_repo"
    depth: 1
    force: true

- name: Copy official docker files to project directory
  become: true
  ansible.builtin.copy:
    src: "{{ supabase_data_dir }}/_repo/docker/"
    dest: "{{ supabase_data_dir }}/"
    remote_src: true
    owner: "{{ username }}"
    group: "{{ username }}"

- name: Create db data directory (root-owned for postgres init)
  become: true
  ansible.builtin.file:
    path: "{{ supabase_data_dir }}/volumes/db/data"
    state: directory

- name: Render .env
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ supabase_data_dir }}/.env"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0600"

- name: Render docker-compose.override.yml (Traefik labels)
  ansible.builtin.template:
    src: docker-compose.override.yml.j2
    dest: "{{ supabase_data_dir }}/docker-compose.override.yml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Remove repo clone (no longer needed after copy)
  ansible.builtin.file:
    path: "{{ supabase_data_dir }}/_repo"
    state: absent

- name: Docker Compose up
  community.docker.docker_compose_v2:
    project_src: "{{ supabase_data_dir }}"
    state: present
    pull: always
