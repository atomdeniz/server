---
- name: Create db data directory
  become: true
  ansible.builtin.file:
    path: "{{ supabase_data_dir }}/volumes/db/data"
    state: directory
    owner: "105"
    group: "106"
    mode: "0700"

- name: Render .env
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ supabase_data_dir }}/.env"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0600"

- name: Render docker-compose.override.yml (Traefik labels)
  ansible.builtin.template:
    src: docker-compose.override.yml.j2
    dest: "{{ supabase_data_dir }}/docker-compose.override.yml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Docker Compose up
  community.docker.docker_compose_v2:
    project_src: "{{ supabase_data_dir }}"
    state: present
    pull: always
