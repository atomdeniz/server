---
# Data directory
supabase_data_dir: "{{ docker_dir }}/supabase"

# JWT
supabase_jwt_expiry: 3600

# Studio
supabase_org_name: "Personal"
supabase_project_name: "Server"

# Kong dashboard username (password in secret.yml)
supabase_dashboard_username: "supabase"

# Secrets — must be defined in secret.yml:
#
#   supabase_postgres_password:             openssl rand -base64 32
#   supabase_jwt_secret:                    openssl rand -base64 32   (min 32 chars)
#   supabase_anon_key:                      JWT signed with jwt_secret, role=anon
#   supabase_service_role_key:              JWT signed with jwt_secret, role=service_role
#   supabase_secret_key_base:               openssl rand -hex 64
#   supabase_vault_enc_key:                 exactly 32 chars  (openssl rand -base64 24 | head -c 32)
#   supabase_pg_meta_crypto_key:            min 32 chars      (openssl rand -base64 32)
#   supabase_logflare_public_access_token:  openssl rand -hex 32
#   supabase_logflare_private_access_token: openssl rand -hex 32
#   supabase_dashboard_password:            strong password
#   supabase_s3_access_key_id:              openssl rand -hex 16
#   supabase_s3_access_key_secret:          openssl rand -hex 32
