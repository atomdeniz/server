---
- name: Create the ekstre html directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/ekstre/html"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"

- name: Deploy the landing page
  ansible.builtin.copy:
    src: "index.html"
    dest: "{{ docker_dir }}/ekstre/html/index.html"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"

- name: Make sure the ekstre container is created and running
  community.general.docker_container:
    name: "ekstre"
    image: "{{ ekstre_image }}"
    pull: "always"
    recreate: "{{ force_recreate | default(false) }}"
    state: started
    restart_policy: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    security_opts:
      - no-new-privileges:true
      - apparmor:docker-default
    networks:
      - name: app_network
    volumes:
      - "{{ docker_dir }}/ekstre/html:/usr/share/nginx/html:ro"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "app_network"
      traefik.http.routers.ekstre.entrypoints: "https"
      traefik.http.routers.ekstre.rule: "Host(`{{ ekstre_host }}`)"
      traefik.http.routers.ekstre.tls: "true"
      traefik.http.routers.ekstre.tls.options: "cloudflare-mtls@file"
      traefik.http.routers.ekstre.service: "ekstre"
      traefik.http.routers.ekstre.middlewares: "open-external@file"
      traefik.http.services.ekstre.loadbalancer.server.port: "80"
