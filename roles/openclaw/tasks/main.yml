---
# --- Claude Max API Proxy (host-level systemd service) ---

- name: Create Claude Code CLI directories
  become: true
  ansible.builtin.file:
    path: "/home/{{ username }}/.claude/{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0750"
  loop:
    - ""
    - downloads
    - bin

- name: Add NodeSource GPG key
  become: true
  ansible.builtin.apt_key:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    state: present

- name: Add NodeSource Node.js 22 repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb https://deb.nodesource.com/node_22.x nodistro main"
    state: present
    filename: nodesource

- name: Install Node.js 22 and git
  become: true
  ansible.builtin.apt:
    name:
      - nodejs
      - git
    state: present
    update_cache: true

- name: Install Claude Code CLI
  become: true
  become_user: "{{ username }}"
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    executable: /bin/bash
    creates: /home/{{ username }}/.claude/bin/claude
  environment:
    HOME: /home/{{ username }}

- name: Install claude-max-api-proxy globally
  become: true
  community.general.npm:
    name: claude-max-api-proxy
    global: true
    state: present

- name: Patch claude-max-api-proxy to listen on all interfaces
  become: true
  ansible.builtin.replace:
    path: /usr/local/lib/node_modules/claude-max-api-proxy/dist/server/standalone.js
    regexp: 'await startServer\(\{ port \}\)'
    replace: 'await startServer({ port, host: "0.0.0.0" })'
  notify: Restart claude-max-api-proxy

- name: Deploy claude-max-api-proxy systemd service
  become: true
  ansible.builtin.template:
    src: claude-max-api-proxy.service.j2
    dest: /etc/systemd/system/claude-max-api-proxy.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart claude-max-api-proxy

- name: Enable and start claude-max-api-proxy
  become: true
  ansible.builtin.systemd:
    name: claude-max-api-proxy
    enabled: true
    state: started
    daemon_reload: true

# --- OpenClaw Gateway (Docker) ---

- name: Create OpenClaw directories
  become: true
  ansible.builtin.file:
    path: "{{ docker_dir }}/openclaw/{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"
  loop:
    - ""
    - config
    - workspace

- name: Deploy OpenClaw config
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: "{{ docker_dir }}/openclaw/config/openclaw.json"
    owner: "1000"
    group: "1000"
    mode: "0640"

- name: Run OpenClaw gateway
  community.docker.docker_container:
    name: openclaw
    image: "ghcr.io/openclaw/openclaw:{{ openclaw_version }}"
    state: started
    restart_policy: unless-stopped
    pull: true
    recreate: "{{ force_recreate | default(false) }}"
    init: true
    memory: "2G"
    memory_swap: "2G"
    security_opts:
      - no-new-privileges:true
    env:
      HOME: "/home/node"
      NODE_ENV: "production"
      NODE_OPTIONS: "--max-old-space-size=1536"
      TERM: "xterm-256color"
      OPENCLAW_GATEWAY_BIND: "lan"
      OPENCLAW_GATEWAY_PORT: "18789"
      OPENCLAW_GATEWAY_TOKEN: "{{ openclaw_gateway_token }}"
      GOG_KEYRING_PASSWORD: "{{ openclaw_gateway_token }}"
      XDG_CONFIG_HOME: "/home/node/.openclaw"
      TELEGRAM_BOT_TOKEN: "{{ openclaw_telegram_bot_token }}"
    volumes:
      - "{{ docker_dir }}/openclaw/config:/home/node/.openclaw:rw"
      - "{{ docker_dir }}/openclaw/workspace:/home/node/.openclaw/workspace:rw"
    command:
      - "node"
      - "dist/index.js"
      - "gateway"
      - "--bind"
      - "lan"
      - "--port"
      - "18789"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:18789/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - name: app_network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "app_network"
      traefik.http.routers.openclaw.entrypoints: "https"
      traefik.http.routers.openclaw.rule: "Host(`{{ openclaw_host }}`)"
      traefik.http.routers.openclaw.tls: "true"
      traefik.http.routers.openclaw.service: "openclaw"
      traefik.http.routers.openclaw.middlewares: "secure-vpn@file"
      traefik.http.services.openclaw.loadbalancer.server.port: "18789"
