---
- name: Create openclaw config directories
  become: true
  ansible.builtin.file:
    path: "{{ docker_dir }}/{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0750"
  loop:
    - openclaw
    - openclaw/data
    - openclaw/browser

- name: Create Claude Code CLI directories
  become: true
  ansible.builtin.file:
    path: "/home/{{ username }}/.claude/{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0750"
  loop:
    - downloads
    - bin

- name: Install Claude Code CLI
  become: true
  become_user: "{{ username }}"
  ansible.builtin.shell:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
    creates: /home/{{ username }}/.claude/bin/claude
  environment:
    HOME: /home/{{ username }}

- name: Install Node.js and npm
  become: true
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present
    update_cache: true

- name: Install claude-max-api-proxy globally
  become: true
  community.general.npm:
    name: claude-max-api-proxy
    global: true
    state: present

- name: Deploy claude-max-api-proxy systemd service
  become: true
  ansible.builtin.template:
    src: claude-max-api-proxy.service.j2
    dest: /etc/systemd/system/claude-max-api-proxy.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart claude-max-api-proxy

- name: Enable and start claude-max-api-proxy
  become: true
  ansible.builtin.systemd:
    name: claude-max-api-proxy
    enabled: true
    state: started
    daemon_reload: true

- name: Deploy OpenClaw browser sidecar
  community.docker.docker_container:
    name: openclaw-browser
    image: "ghcr.io/coollabsio/openclaw-browser:latest"
    state: started
    restart_policy: unless-stopped
    recreate: "{{ force_recreate | default(false) }}"
    capabilities:
      - SYS_ADMIN
    security_opts:
      - seccomp:unconfined
    shm_size: "1g"
    volumes:
      - "{{ docker_dir }}/openclaw/browser:/home/kasm-user"
    networks:
      - name: app_network
    labels:
      traefik.enable: "false"

- name: Run OpenClaw
  community.docker.docker_container:
    name: openclaw
    image: "coollabsio/openclaw:{{ openclaw_version | default('latest') }}"
    state: started
    restart_policy: unless-stopped
    security_opts:
      - no-new-privileges:true
    recreate: "{{ force_recreate | default(false) }}"
    pull: always
    env:
      TELEGRAM_BOT_TOKEN: "{{ openclaw_telegram_bot_token }}"
      NODE_ENV: "production"
      OPENCLAW_DATA_DIR: "/home/openclaw/data"
      OPENAI_API_KEY: "not-needed"
      OPENAI_BASE_URL: "http://172.17.0.1:3456/v1"
      AUTH_PASSWORD: "{{ openclaw_auth_password }}"
      OPENCLAW_GATEWAY_TOKEN: "{{ openclaw_gateway_token }}"
      BROWSER_CDP_URL: "http://openclaw-browser:9223"
      BROWSER_EVALUATE_ENABLED: "true"
      BROWSER_SNAPSHOT_MODE: "efficient"
    volumes:
      - "{{ docker_dir }}/openclaw/data:/home/openclaw/data"
    networks:
      - name: edge_network
      - name: app_network
    labels:
      traefik.enable: "true"
      traefik.docker.network: "app_network"
      traefik.http.routers.openclaw.entrypoints: "https"
      traefik.http.routers.openclaw.rule: "Host(`{{ openclaw_host }}`)"
      traefik.http.routers.openclaw.tls: "true"
      traefik.http.routers.openclaw.service: "openclaw"
      traefik.http.routers.openclaw.middlewares: "secure-vpn-with-auth@file"
      traefik.http.services.openclaw.loadbalancer.server.port: "8080"
