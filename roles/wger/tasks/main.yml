---
- name: Create wger directories
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  loop:
    - "{{ wger_project_dir }}"
    - "{{ wger_project_dir }}/config"

- name: Template wger compose stack
  become: true
  ansible.builtin.template:
    src: docker-compose.yml
    dest: "{{ wger_project_dir }}/docker-compose.yml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Template wger production env
  become: true
  ansible.builtin.template:
    src: prod.env
    dest: "{{ wger_project_dir }}/config/prod.env"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Start wger stack
  community.docker.docker_compose_v2:
    project_src: "{{ wger_project_dir }}"
    state: present
    remove_orphans: true

- name: Collect wger static files
  become: true
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - "{{ wger_project_dir }}/docker-compose.yml"
      - --project-name
      - wger
      - exec
      - -T
      - web
      - python3
      - manage.py
      - collectstatic
      - --noinput
  register: wger_collectstatic
  changed_when: false
  retries: 10
  delay: 3
  until: wger_collectstatic.rc == 0
