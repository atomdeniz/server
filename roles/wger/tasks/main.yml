---
- name: Create wger directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  loop:
    - "{{ wger_project_dir }}"
    - "{{ wger_project_dir }}/config"

- name: Template wger compose stack
  ansible.builtin.template:
    src: docker-compose.yml
    dest: "{{ wger_project_dir }}/docker-compose.yml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Template wger production env
  ansible.builtin.template:
    src: prod.env
    dest: "{{ wger_project_dir }}/config/prod.env"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Template wger redis config
  ansible.builtin.template:
    src: redis.conf
    dest: "{{ wger_project_dir }}/config/redis.conf"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Start wger stack
  community.docker.docker_compose_v2:
    project_src: "{{ wger_project_dir }}"
    state: present
