---
services:
  web:
    image: "docker.io/wger/server:{{ wger_version }}"
    restart: unless-stopped
    depends_on:
      cache:
        condition: service_healthy
    env_file:
      - ./config/prod.env
    expose:
      - "8000"
    networks:
      - default
      - reverse_proxy_network
      - postgres_network
    volumes:
      - static:/home/wger/static
      - media:/home/wger/media
    labels:
      traefik.enable: "true"
      traefik.docker.network: "reverse_proxy_network"
      traefik.http.routers.wger.entrypoints: "https"
      traefik.http.routers.wger.rule: "Host(`{{ wger_host }}`)"
      traefik.http.routers.wger.tls: "true"
      traefik.http.routers.wger.service: "wger"
      traefik.http.routers.wger.middlewares: "secure-vpn-with-auth@file"
      traefik.http.services.wger.loadbalancer.server.port: "8000"

  cache:
    image: "docker.io/redis:{{ wger_redis_version }}"
    restart: unless-stopped
    command: ["redis-server", "/etc/redis.conf"]
    volumes:
      - ./config/redis.conf:/etc/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    image: "docker.io/wger/server:{{ wger_version }}"
    restart: unless-stopped
    command: /start-worker
    depends_on:
      cache:
        condition: service_healthy
    env_file:
      - ./config/prod.env
    networks:
      - default
      - postgres_network
    volumes:
      - media:/home/wger/media

  celery_beat:
    image: "docker.io/wger/server:{{ wger_version }}"
    restart: unless-stopped
    command: /start-beat
    depends_on:
      cache:
        condition: service_healthy
    env_file:
      - ./config/prod.env
    networks:
      - default
      - postgres_network
    volumes:
      - media:/home/wger/media

volumes:
  static:
  media:

networks:
  reverse_proxy_network:
    external: true
  postgres_network:
    external: true
