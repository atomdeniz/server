---
- name: Ensure seedbox SSH key exists on host
  ansible.builtin.stat:
    path: "{{ seedbox_sync_ui_ssh_key }}"
  register: seedbox_sync_ui_key_stat

- name: Fail if seedbox SSH key is missing
  ansible.builtin.fail:
    msg: >-
      Seedbox SSH key not found at {{ seedbox_sync_ui_ssh_key }}.
      Run the media_cleanup role first (it creates the key and prints
      the public half to add to the slot's authorized_keys).
  when: not seedbox_sync_ui_key_stat.stat.exists

- name: Create seedbox_sync_ui directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/seedbox_sync_ui"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"

- name: Copy app.py
  ansible.builtin.template:
    src: app.py
    dest: "{{ docker_dir }}/seedbox_sync_ui/app.py"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"

- name: Copy requirements.txt
  ansible.builtin.template:
    src: requirements.txt
    dest: "{{ docker_dir }}/seedbox_sync_ui/requirements.txt"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"

- name: Copy Dockerfile
  ansible.builtin.template:
    src: Dockerfile
    dest: "{{ docker_dir }}/seedbox_sync_ui/Dockerfile"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"

- name: Copy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_dir }}/seedbox_sync_ui/docker-compose.yml"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0640"

- name: Docker Compose up
  community.docker.docker_compose_v2:
    project_src: "{{ docker_dir }}/seedbox_sync_ui"
    build: always
    state: present
    recreate: "{{ 'always' if (force_recreate | default(false)) else 'auto' }}"
