---
# Official wg-easy v15 image: bundles amneziawg-go + awg in userspace (no kernel
# module needed on ARM64) and is tracked by Cup.
amnezia_wg_image: "ghcr.io/wg-easy/wg-easy"
amnezia_wg_image_tag: "15.3.0"

# Web UI admin, seeded via INIT_USERNAME (password is the vault var amnezia_password)
amnezia_wg_admin_username: "admin"

# AmneziaWG 2.0 params (applied to the v15 DB; v15 itself only generates the 1.0
# set). I1-I5 are pre-handshake signature packets in awg's <b 0xHEX>/<r N>/
# <rc N>/<t> DSL; they need not match between peers.
amnezia_wg_awg2_signature_packets:
  - "<b 0xc30000000108><r 8><b 0x08><r 8><b 0x0045dc><t><r 16>"   # QUIC Initial
  - "<b 0x1603010200><r 2><b 0x0303><t><r 28>"                     # TLS ClientHello
  - "<r 2><b 0x0100000100000000000003><rc 8><b 0x0000010001>"      # DNS query
  - "<b 0x474554202f><rc 12><b 0x20485454502f312e310d0a0d0a>"      # HTTP GET
  - "<b 0x2112a442><r 16><t><r 8>"                                 # STUN

# Cookie/transport padding; must match peers (so clients re-download configs).
# S4 pads every transport packet, kept small to stay under MTU.
amnezia_wg_awg2_s3: 64
amnezia_wg_awg2_s4: 16

# Clamp forwarded TCP MSS so large TLS flows survive the AWG-obfuscation overhead
# on constrained client uplinks. Seeded into the v15 PostUp hook.
amnezia_wg_mss_clamp: 1280
