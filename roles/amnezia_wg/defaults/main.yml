---
amnezia_wg_version: "v1"

# Upstream source pins for the locally-built amnezia-wg-easy image. ARM64 has
# no working upstream image, so we build from source (see
# w0rng/amnezia-wg-easy#10). Bumping any of these + rerunning with
# -e force_recreate=true rebuilds the image against the new ref.
#
# go/tools are pinned to release TAGS: readable, and tracked by the
# .github/workflows/amnezia-upstream-check.yml workflow, which opens an issue
# when a newer tag is published. amnezia-wg-easy is a dead fork (no releases
# since 2024-09-22) so it stays pinned to a commit SHA — nothing to track.
amnezia_wg_go_tag: "v0.2.19"            # amnezia-vpn/amneziawg-go
amnezia_wg_tools_tag: "v1.0.20260618-2" # amnezia-vpn/amneziawg-tools
amnezia_wg_easy_commit: "139126743757157f6c51b10132c0b8cb3824735a" # w0rng/amnezia-wg-easy @ master HEAD
