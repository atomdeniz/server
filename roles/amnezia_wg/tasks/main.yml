---
- name: Create the AmneziaWG directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/amnezia-wg"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  become: true

- name: Pull the official wg-easy v15 image
  community.docker.docker_image:
    name: "{{ amnezia_wg_image }}:{{ amnezia_wg_image_tag }}"
    source: pull
    force_source: true

- name: Configure AmneziaWG (wg-easy v15, userspace AWG 2.0)
  community.general.docker_container:
    name: "amnezia-wg"
    image: "{{ amnezia_wg_image }}:{{ amnezia_wg_image_tag }}"
    pull: true
    recreate: "{{ force_recreate | default(false) }}"
    state: started
    restart_policy: unless-stopped
    # v15's `wg show` healthcheck can't see the userspace awg0, so it false-flaps
    healthcheck:
      test: ["NONE"]
    security_opts:
      - no-new-privileges:true
      - apparmor:docker-default
    networks:
      - name: dns_network
        driver_opts:
          com.docker.network.endpoint.ifname: "myeth"
      - name: app_network
      - name: ops_network
    sysctls:
      "net.ipv4.conf.all.src_valid_mark": "1"
      "net.ipv4.ip_forward": "1"
    capabilities:
      - net_admin
    devices:
      - /dev/net/tun:/dev/net/tun
    env:
      PORT: "51821"
      HOST: "0.0.0.0"
      INSECURE: "false"
      DISABLE_IPV6: "true"
      # force userspace amneziawg-go (no kernel module on this VPS)
      EXPERIMENTAL_AWG: "true"
      OVERRIDE_AUTO_AWG: "awg"
      # INIT_* seed the admin + interface on first boot only
      INIT_ENABLED: "true"
      INIT_USERNAME: "{{ amnezia_wg_admin_username }}"
      INIT_PASSWORD: "{{ amnezia_password }}"   # plaintext; v15 hashes it
      INIT_HOST: "{{ ansible_host }}"
      INIT_PORT: "{{ vpn_port }}"
      INIT_DNS: "{{ adguard_local_ip }}"
      INIT_ALLOWED_IPS: "{{ vpn_client_allowed_ips }}"
      INIT_IPV4_CIDR: "{{ vpn_subnet_cidr }}"
    ports:
      - "{{ vpn_port }}:51820/udp"
    volumes:
      - "{{ docker_dir }}/amnezia-wg:/etc/wireguard"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "app_network"
      traefik.http.routers.amnezia-wg.entrypoints: "https"
      traefik.http.routers.amnezia-wg.rule: "Host(`{{ vpn_host }}`) && !Path(`/knock-knock`)"
      traefik.http.routers.amnezia-wg.tls: "true"
      traefik.http.routers.amnezia-wg.tls.options: "cloudflare-mtls@file"
      traefik.http.routers.amnezia-wg.service: "amnezia-wg"
      traefik.http.services.amnezia-wg.loadbalancer.server.port: "51821"
      traefik.http.routers.amnezia-wg.middlewares: "dynamic-ipwhitelist@file,secure-external@file"
      # /knock-knock authorizes the caller's IP via the standalone traefikshaper
      traefik.http.routers.amnezia-wg-dynamic.entrypoints: "https"
      traefik.http.routers.amnezia-wg-dynamic.rule: "Host(`{{ vpn_host }}`) && PathPrefix(`/knock-knock`)"
      traefik.http.routers.amnezia-wg-dynamic.tls: "true"
      traefik.http.routers.amnezia-wg-dynamic.tls.options: "cloudflare-mtls@file"
      traefik.http.routers.amnezia-wg-dynamic.service: "traefikshaper"
      traefik.http.services.amnezia-wg-dynamic.loadbalancer.server.port: "5000"

- name: Broaden the v15 NAT masquerade hook so VPN client DNS works
  # v15 seeds `-o eth0`, which skips DNS leaving via myeth; `! -o wg0` covers both
  ansible.builtin.script:
    cmd: "files/fix_masquerade_hook.py {{ docker_dir }}/amnezia-wg/wg-easy.db"
    executable: python3
  register: amnezia_wg_hook_fix
  changed_when: "'CHANGED' in amnezia_wg_hook_fix.stdout"
  notify: Restart amnezia-wg

- name: Seed the MSS clamp into the v15 PostUp hook
  ansible.builtin.script:
    cmd: "files/ensure_mss_clamp.py {{ docker_dir }}/amnezia-wg/wg-easy.db {{ amnezia_wg_mss_clamp }}"
    executable: python3
  register: amnezia_wg_mss_fix
  changed_when: "'CHANGED' in amnezia_wg_mss_fix.stdout"
  notify: Restart amnezia-wg

- name: Render the AmneziaWG 2.0 obfuscation params
  ansible.builtin.template:
    src: awg2.json.j2
    dest: "{{ docker_dir }}/amnezia-wg-awg2.json"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"

- name: Apply AmneziaWG 2.0 signature packets + paddings to the v15 DB
  ansible.builtin.script:
    cmd: "files/apply_awg2.py {{ docker_dir }}/amnezia-wg/wg-easy.db {{ docker_dir }}/amnezia-wg-awg2.json"
    executable: python3
  register: amnezia_wg_awg2_apply
  changed_when: "'CHANGED' in amnezia_wg_awg2_apply.stdout"
  notify: Restart amnezia-wg
