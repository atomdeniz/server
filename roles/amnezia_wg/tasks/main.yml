---
- name: Create the AmneziaWG directory
  ansible.builtin.file:
    path: "{{ docker_dir }}/amnezia-wg"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0775"
  become: true

- name: Pull the official wg-easy v15 image
  community.docker.docker_image:
    name: "{{ amnezia_wg_image }}:{{ amnezia_wg_image_tag }}"
    source: pull
    force_source: true

- name: Configure AmneziaWG (wg-easy v15, userspace AWG 2.0)
  community.general.docker_container:
    name: "amnezia-wg"
    image: "{{ amnezia_wg_image }}:{{ amnezia_wg_image_tag }}"
    pull: true
    recreate: "{{ force_recreate | default(false) }}"
    state: started
    restart_policy: unless-stopped
    # v15's HEALTHCHECK runs `wg show | grep interface`, but in AWG userspace
    # mode the device is an amneziawg-go interface that plain `wg` does not list,
    # so the built-in check would flap to "unhealthy" while the tunnel is fine.
    # Disable it; Gatus/awg show is the real liveness signal.
    healthcheck:
      test: ["NONE"]
    security_opts:
      - no-new-privileges:true
      - apparmor:docker-default
    networks:
      - name: dns_network
        driver_opts:
          com.docker.network.endpoint.ifname: "myeth"
      - name: app_network
      - name: ops_network
    sysctls:
      "net.ipv4.conf.all.src_valid_mark": "1"
      "net.ipv4.ip_forward": "1"
    capabilities:
      - net_admin
    devices:
      - /dev/net/tun:/dev/net/tun
    env:
      # --- runtime (v15 WG_ENV) ---
      PORT: "51821"           # web UI port (v15 default); Traefik targets this
      HOST: "0.0.0.0"
      INSECURE: "false"       # served behind Traefik TLS
      DISABLE_IPV6: "true"    # IPv6 is disabled at the Hetzner layer (see CLAUDE.md)
      # --- AmneziaWG userspace ---
      # This VPS has no amneziawg kernel module. EXPERIMENTAL_AWG enables AWG and
      # OVERRIDE_AUTO_AWG=awg forces the userspace amneziawg-go path, skipping the
      # `modinfo amneziawg` probe (which would otherwise fall back to plain wg).
      EXPERIMENTAL_AWG: "true"
      OVERRIDE_AUTO_AWG: "awg"
      # --- one-time unattended provisioning (v15 WG_INITIAL_ENV) ---
      # Consumed only on first boot, before setup is marked complete; ignored on
      # every subsequent start. All four of USERNAME/PASSWORD/HOST/PORT are
      # required for the admin user to be created without the web wizard.
      INIT_ENABLED: "true"
      INIT_USERNAME: "{{ amnezia_wg_admin_username }}"
      INIT_PASSWORD: "{{ amnezia_password }}"   # plaintext; v15 argon2-hashes it
      INIT_HOST: "{{ ansible_host }}"
      INIT_PORT: "{{ vpn_port }}"
      INIT_DNS: "{{ adguard_local_ip }}"
      INIT_ALLOWED_IPS: "{{ vpn_client_allowed_ips }}"
      # v15's seeded default IPv4 CIDR is already 10.8.0.0/24 (== vpn_subnet_cidr).
      # NOTE: v15 only applies the CIDR override when BOTH INIT_IPV4_CIDR and
      # INIT_IPV6_CIDR are set; with IPv6 disabled this stays a no-op that simply
      # documents the intended subnet.
      INIT_IPV4_CIDR: "{{ vpn_subnet_cidr }}"
    ports:
      - "{{ vpn_port }}:51820/udp"
    # v15 stores everything (SQLite DB wg-easy.db + generated wg0.conf + keys)
    # under a single path. The image symlinks /etc/amnezia/amneziawg -> here.
    volumes:
      - "{{ docker_dir }}/amnezia-wg:/etc/wireguard"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "app_network"
      # Main UI router. v15 serves the web UI on 51821 (same as the old fork).
      traefik.http.routers.amnezia-wg.entrypoints: "https"
      traefik.http.routers.amnezia-wg.rule: "Host(`{{ vpn_host }}`) && !Path(`/knock-knock`)"
      traefik.http.routers.amnezia-wg.tls: "true"
      traefik.http.routers.amnezia-wg.service: "amnezia-wg"
      traefik.http.services.amnezia-wg.loadbalancer.server.port: "51821"
      traefik.http.routers.amnezia-wg.middlewares: "dynamic-ipwhitelist@file,secure-external@file"
      # TraefikShaper "knock" endpoint on the same host: hitting
      # https://{{ vpn_host }}/knock-knock authorizes the caller's IP into the
      # dynamic-ipwhitelist that gates the router above. traefikshaper is a
      # standalone service from the traefik role (port 5000), independent of the
      # VPN image, so this stays unchanged across the v15 migration.
      traefik.http.routers.amnezia-wg-dynamic.entrypoints: "https"
      traefik.http.routers.amnezia-wg-dynamic.rule: "Host(`{{ vpn_host }}`) && PathPrefix(`/knock-knock`)"
      traefik.http.routers.amnezia-wg-dynamic.tls: "true"
      traefik.http.routers.amnezia-wg-dynamic.service: "traefikshaper"
      traefik.http.services.amnezia-wg-dynamic.loadbalancer.server.port: "5000"

- name: Broaden the v15 NAT masquerade hook so VPN client DNS works
  # v15 seeds the interface masquerade as `-o eth0`, which only NATs traffic
  # leaving eth0 (internet). VPN clients' DNS goes to AdGuard on dns_network via
  # the `myeth` interface, so it isn't masqueraded and AdGuard can't route
  # replies back to the VPN subnet -> client DNS/internet breaks. No env
  # overrides the seeded hook, so patch the DB to the device-agnostic
  # `! -o wg0` form. Idempotent; restarts the container only when it rewrites.
  ansible.builtin.script:
    cmd: "files/fix_masquerade_hook.py {{ docker_dir }}/amnezia-wg/wg-easy.db"
    executable: python3
  register: amnezia_wg_hook_fix
  changed_when: "'CHANGED' in amnezia_wg_hook_fix.stdout"
  notify: Restart amnezia-wg to apply masquerade hook
