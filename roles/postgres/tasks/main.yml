---
- name: Create shared postgres data directory
  become: true
  ansible.builtin.file:
    path: "{{ postgres_data_dir }}"
    state: directory

- name: Run shared postgres container
  community.docker.docker_container:
    name: "{{ postgres_container_name }}"
    image: "{{ postgres_image }}"
    pull: "always"
    recreate: "{{ force_recreate | default(false) }}"
    state: started
    restart_policy: unless-stopped
    shm_size: "{{ postgres_shm_size }}"
    env:
      POSTGRES_PASSWORD: "{{ postgres_bootstrap_password }}"
      POSTGRES_USER: "{{ postgres_bootstrap_user }}"
      POSTGRES_DB: "{{ postgres_bootstrap_db }}"
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - "{{ postgres_data_dir }}:/var/lib/postgresql/data"
    labels:
      wud.watch: "false"
    networks:
      - name: postgres_network

- name: Wait for postgres readiness
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ postgres_container_name }}"
      - pg_isready
      - -U
      - "{{ postgres_bootstrap_user }}"
  register: postgres_ready
  changed_when: false
  retries: 20
  delay: 3
  until: postgres_ready.rc == 0

- name: Ensure wger role exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ postgres_container_name }}"
      - psql
      - -U
      - "{{ postgres_bootstrap_user }}"
      - -d
      - postgres
      - -tAc
      - "SELECT 1 FROM pg_roles WHERE rolname='{{ postgres_wger_db_user }}';"
  register: postgres_wger_role_exists
  changed_when: false

- name: Create wger role if missing
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ postgres_container_name }}"
      - psql
      - -U
      - "{{ postgres_bootstrap_user }}"
      - -d
      - postgres
      - -c
      - "CREATE ROLE {{ postgres_wger_db_user }} LOGIN PASSWORD $${{ postgres_wger_db_password }}$$;"
  when: postgres_wger_role_exists.stdout | trim != "1"

- name: Update wger role password
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ postgres_container_name }}"
      - psql
      - -U
      - "{{ postgres_bootstrap_user }}"
      - -d
      - postgres
      - -c
      - "ALTER ROLE {{ postgres_wger_db_user }} WITH LOGIN PASSWORD $${{ postgres_wger_db_password }}$$;"
  changed_when: false

- name: Ensure wger database exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ postgres_container_name }}"
      - psql
      - -U
      - "{{ postgres_bootstrap_user }}"
      - -d
      - postgres
      - -tAc
      - "SELECT 1 FROM pg_database WHERE datname='{{ postgres_wger_db_name }}';"
  register: postgres_wger_db_exists
  changed_when: false

- name: Create wger database if missing
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ postgres_container_name }}"
      - psql
      - -U
      - "{{ postgres_bootstrap_user }}"
      - -d
      - postgres
      - -c
      - "CREATE DATABASE {{ postgres_wger_db_name }} OWNER {{ postgres_wger_db_user }};"
  when: postgres_wger_db_exists.stdout | trim != "1"

- name: Ensure wger privileges are set
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - "{{ postgres_container_name }}"
      - psql
      - -U
      - "{{ postgres_bootstrap_user }}"
      - -d
      - postgres
      - -c
      - "GRANT ALL PRIVILEGES ON DATABASE {{ postgres_wger_db_name }} TO {{ postgres_wger_db_user }};"
  changed_when: false
