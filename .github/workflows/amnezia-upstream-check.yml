name: amnezia upstream check

# Cup can't track amnezia-wg-easy-local (built locally on the server, so it has
# no registry tag to compare against). This watches the two ACTIVE upstreams —
# amneziawg-go and amneziawg-tools — for new release tags and opens an issue when
# the pin in roles/amnezia_wg/defaults/main.yml falls behind. amnezia-wg-easy is
# a dead fork (no releases since 2024-09-22) and is intentionally not tracked.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: amneziawg-go
            repo: amnezia-vpn/amneziawg-go
            var: amnezia_wg_go_tag
          - name: amneziawg-tools
            repo: amnezia-vpn/amneziawg-tools
            var: amnezia_wg_tools_tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check ${{ matrix.name }} for a newer tag
        env:
          GH_TOKEN: ${{ github.token }}
          NAME: ${{ matrix.name }}
          REPO: ${{ matrix.repo }}
          VAR: ${{ matrix.var }}
        run: |
          set -euo pipefail
          DEFAULTS="roles/amnezia_wg/defaults/main.yml"

          # Highest version tag upstream (version-aware sort, deref refs)
          latest="$(git ls-remote --tags --refs --sort=-v:refname \
            "https://github.com/${REPO}.git" | head -1 | sed 's#.*refs/tags/##')"
          # Currently pinned tag from defaults/main.yml
          pinned="$(grep -E "^${VAR}:" "$DEFAULTS" | head -1 \
            | sed -E 's/^[^:]*:[[:space:]]*"([^"]+)".*/\1/')"

          echo "pinned=${pinned} latest=${latest}"
          if [ -z "$latest" ]; then echo "could not resolve latest tag"; exit 1; fi
          if [ "$latest" = "$pinned" ]; then echo "up to date"; exit 0; fi

          # De-dupe: skip if an open issue for this component already exists
          open="$(gh issue list --state open --limit 100 --json title \
            --jq "[.[] | select(.title | startswith(\"chore(amnezia_wg): ${NAME} \"))] | length")"
          if [ "$open" -gt 0 ]; then echo "issue already open, skipping"; exit 0; fi

          title="chore(amnezia_wg): ${NAME} ${latest} available (pinned ${pinned})"
          cat > /tmp/body.md <<EOF
          \`${NAME}\` has a newer release tag than the one pinned in this repo.

          - **Pinned:** \`${pinned}\`
          - **Latest:** \`${latest}\`
          - **Releases:** https://github.com/${REPO}/releases

          ### To update
          1. Bump \`${VAR}\` in \`${DEFAULTS}\` to \`${latest}\`.
          2. Redeploy — the Dockerfile ref changes, so the image rebuilds:
             \`\`\`
             ansible-playbook playbook.yml -i inventory.yml -e @custom.yml -e @secret.yml \\
               --vault-password-file ~/.vault_pass --tags amnezia_wg -e force_recreate=true
             \`\`\`

          _Opened automatically by \`.github/workflows/amnezia-upstream-check.yml\`._
          EOF

          gh issue create --title "$title" --body-file /tmp/body.md
